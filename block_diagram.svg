<svg viewBox="0 0 960 700" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="960" height="700" fill="#f0f4f8"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a202c">SBR V5 — Smart Gesture Control System</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#718096">System Block Diagram</text>

  <!-- ===================== INPUT LAYER ===================== -->
  <!-- Webcam -->
  <rect x="30" y="90" width="130" height="56" rx="8" fill="#2b6cb0" stroke="#1a4d8a" stroke-width="1.5"/>
  <text x="95" y="117" text-anchor="middle" font-size="13" font-weight="bold" fill="white">📷 Webcam</text>
  <text x="95" y="133" text-anchor="middle" font-size="10" fill="#bee3f8">camera_config.py</text>

  <!-- Arrow: webcam → main loop -->
  <line x1="160" y1="118" x2="205" y2="118" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="182" y="112" text-anchor="middle" font-size="9" fill="#4a5568">frame</text>

  <!-- ===================== MAIN LOOP ===================== -->
  <rect x="205" y="78" width="150" height="80" rx="8" fill="#276749" stroke="#1c4532" stroke-width="1.5"/>
  <text x="280" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="white">⚙️ Main Loop</text>
  <text x="280" y="120" text-anchor="middle" font-size="10" fill="#9ae6b4">main.py</text>
  <text x="280" y="136" text-anchor="middle" font-size="9" fill="#9ae6b4">Orchestrates all modules</text>

  <!-- Arrow: main → hand detector -->
  <line x1="355" y1="118" x2="400" y2="118" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="377" y="112" text-anchor="middle" font-size="9" fill="#4a5568">RGB</text>

  <!-- ===================== HAND DETECTOR ===================== -->
  <rect x="400" y="78" width="150" height="80" rx="8" fill="#6b46c1" stroke="#44337a" stroke-width="1.5"/>
  <text x="475" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🖐 Hand Detector</text>
  <text x="475" y="120" text-anchor="middle" font-size="10" fill="#d6bcfa">hand_detector.py</text>
  <text x="475" y="136" text-anchor="middle" font-size="9" fill="#d6bcfa">MediaPipe Hands</text>

  <!-- Arrow: hand detector → ml gesture model -->
  <line x1="550" y1="118" x2="595" y2="118" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="572" y="112" text-anchor="middle" font-size="9" fill="#4a5568">landmarks</text>

  <!-- ===================== ML GESTURE MODEL ===================== -->
  <rect x="595" y="78" width="155" height="80" rx="8" fill="#c05621" stroke="#7b341e" stroke-width="1.5"/>
  <text x="672" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🧠 MLGestureModel</text>
  <text x="672" y="116" text-anchor="middle" font-size="10" fill="#fed7aa">ml_gesture_model.py</text>
  <text x="672" y="130" text-anchor="middle" font-size="9" fill="#fed7aa">Landmark-based classifier</text>
  <text x="672" y="144" text-anchor="middle" font-size="9" fill="#fed7aa">Returns gesture + confidence</text>

  <!-- Arrow: ml → state machine -->
  <line x1="750" y1="118" x2="795" y2="118" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="772" y="112" text-anchor="middle" font-size="9" fill="#4a5568">(gesture, conf)</text>

  <!-- ===================== GESTURE STATE MACHINE ===================== -->
  <rect x="795" y="78" width="145" height="80" rx="8" fill="#9b2c2c" stroke="#63171b" stroke-width="1.5"/>
  <text x="867" y="101" text-anchor="middle" font-size="11" font-weight="bold" fill="white">🔀 GestureStateMachine</text>
  <text x="867" y="116" text-anchor="middle" font-size="10" fill="#feb2b2">gesture_state_machine.py</text>
  <text x="867" y="130" text-anchor="middle" font-size="9" fill="#feb2b2">Smoothing · Priority</text>
  <text x="867" y="144" text-anchor="middle" font-size="9" fill="#feb2b2">Cooldown · Majority vote</text>

  <!-- ===================== HAND ROLES LAYER ===================== -->

  <!-- Left Hand Box -->
  <rect x="100" y="220" width="180" height="110" rx="8" fill="#2c7a7b" stroke="#1d4e4e" stroke-width="1.5"/>
  <text x="190" y="244" text-anchor="middle" font-size="12" font-weight="bold" fill="white">LEFT HAND</text>
  <text x="190" y="260" text-anchor="middle" font-size="10" fill="#81e6d9">gesture_logic.py</text>
  <rect x="115" y="268" width="150" height="22" rx="4" fill="#1d4e4e"/>
  <text x="190" y="283" text-anchor="middle" font-size="10" fill="#81e6d9">count_fingers()</text>
  <rect x="115" y="296" width="150" height="22" rx="4" fill="#1d4e4e"/>
  <text x="190" y="311" text-anchor="middle" font-size="10" fill="#81e6d9">speed_from_fingers() → 0–255</text>

  <!-- Right Hand Box -->
  <rect x="310" y="220" width="180" height="110" rx="8" fill="#2a4365" stroke="#1a365d" stroke-width="1.5"/>
  <text x="400" y="244" text-anchor="middle" font-size="12" font-weight="bold" fill="white">RIGHT HAND</text>
  <text x="400" y="260" text-anchor="middle" font-size="10" fill="#90cdf4">Gesture → Command</text>
  <rect x="325" y="268" width="150" height="22" rx="4" fill="#1a365d"/>
  <text x="400" y="283" text-anchor="middle" font-size="10" fill="#90cdf4">THUMB_UP → FORWARD</text>
  <rect x="325" y="296" width="150" height="22" rx="4" fill="#1a365d"/>
  <text x="400" y="311" text-anchor="middle" font-size="10" fill="#90cdf4">THUMBS_DOWN → STOP</text>

  <!-- GestureStability -->
  <rect x="520" y="220" width="155" height="80" rx="8" fill="#553c9a" stroke="#322659" stroke-width="1.5"/>
  <text x="597" y="246" text-anchor="middle" font-size="12" font-weight="bold" fill="white">GestureStability</text>
  <text x="597" y="262" text-anchor="middle" font-size="10" fill="#d6bcfa">gesture_stability.py</text>
  <text x="597" y="278" text-anchor="middle" font-size="9" fill="#d6bcfa">Rolling buffer — emits only</text>
  <text x="597" y="292" text-anchor="middle" font-size="9" fill="#d6bcfa">when all frames agree</text>

  <!-- MLCommandMapper -->
  <rect x="710" y="220" width="155" height="80" rx="8" fill="#744210" stroke="#4a2800" stroke-width="1.5"/>
  <text x="787" y="246" text-anchor="middle" font-size="12" font-weight="bold" fill="white">MLCommandMapper</text>
  <text x="787" y="262" text-anchor="middle" font-size="10" fill="#fbd38d">ml_to_cmd.py</text>
  <text x="787" y="278" text-anchor="middle" font-size="9" fill="#fbd38d">Confidence gate · Lock timer</text>
  <text x="787" y="292" text-anchor="middle" font-size="9" fill="#fbd38d">Per-hand command buffer</text>

  <!-- ===================== PACKET ASSEMBLY ===================== -->
  <rect x="340" y="390" width="280" height="64" rx="8" fill="#1a202c" stroke="#4a5568" stroke-width="1.5"/>
  <text x="480" y="416" text-anchor="middle" font-size="13" font-weight="bold" fill="white">📦 Packet Assembly</text>
  <text x="480" y="434" text-anchor="middle" font-size="11" fill="#a0aec0">Format: COMMAND,SPEED_LEVEL\n</text>
  <text x="480" y="448" text-anchor="middle" font-size="10" fill="#718096">e.g. "FORWARD,3\n"  |  speed_level = 0–5</text>

  <!-- ===================== SERIAL COMM ===================== -->
  <rect x="340" y="520" width="280" height="64" rx="8" fill="#2d3748" stroke="#4a5568" stroke-width="1.5"/>
  <text x="480" y="546" text-anchor="middle" font-size="13" font-weight="bold" fill="white">📡 SerialComm</text>
  <text x="480" y="562" text-anchor="middle" font-size="11" fill="#a0aec0">serial_comm.py</text>
  <text x="480" y="576" text-anchor="middle" font-size="10" fill="#718096">USB (auto-detect) · Bluetooth HC-05</text>

  <!-- ===================== MICROCONTROLLER ===================== -->
  <rect x="340" y="648" width="280" height="40" rx="8" fill="#22543d" stroke="#1c4532" stroke-width="1.5"/>
  <text x="480" y="673" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🤖 Arduino / ESP32</text>

  <!-- ===================== DASHBOARD ===================== -->
  <rect x="680" y="390" width="180" height="64" rx="8" fill="#1a202c" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="770" y="416" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🖥️ Dashboard</text>
  <text x="770" y="432" text-anchor="middle" font-size="10" fill="#a0aec0">dashboard.py</text>
  <text x="770" y="446" text-anchor="middle" font-size="9" fill="#718096">Gesture · Confidence bar · Speed · CMD</text>

  <!-- CONFIG.JSON -->
  <rect x="60" y="390" width="180" height="64" rx="8" fill="#285e61" stroke="#1d4044" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="150" y="416" text-anchor="middle" font-size="13" font-weight="bold" fill="white">⚙️ config.json</text>
  <text x="150" y="432" text-anchor="middle" font-size="10" fill="#81e6d9">port · baud · camera</text>
  <text x="150" y="446" text-anchor="middle" font-size="9" fill="#81e6d9">gesture_map · stability_frames</text>

  <!-- LOGGER -->
  <rect x="60" y="520" width="180" height="64" rx="8" fill="#322659" stroke="#1a1033" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="150" y="546" text-anchor="middle" font-size="13" font-weight="bold" fill="white">📝 Logger</text>
  <text x="150" y="562" text-anchor="middle" font-size="10" fill="#d6bcfa">logger_config.py</text>
  <text x="150" y="576" text-anchor="middle" font-size="9" fill="#d6bcfa">gesture.log + stdout</text>

  <!-- ===================== VERTICAL CONNECTOR ARROWS ===================== -->

  <!-- GSM → left hand (down from GSM to left-hand area) -->
  <line x1="867" y1="158" x2="867" y2="200" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="867" y1="200" x2="190" y2="200" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="190" y1="200" x2="190" y2="220" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GSM → right hand -->
  <line x1="400" y1="158" x2="400" y2="220" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GSM → GestureStability -->
  <line x1="597" y1="158" x2="597" y2="220" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GSM → MLCommandMapper -->
  <line x1="787" y1="158" x2="787" y2="220" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Left hand → Packet -->
  <line x1="190" y1="330" x2="190" y2="368" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="190" y1="368" x2="410" y2="368" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="410" y1="368" x2="410" y2="390" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="295" y="363" text-anchor="middle" font-size="9" fill="#4a5568">speed_level</text>

  <!-- Right hand → Packet -->
  <line x1="400" y1="330" x2="480" y2="330" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="480" y1="330" x2="480" y2="390" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="510" y="350" text-anchor="middle" font-size="9" fill="#4a5568">gesture_cmd</text>

  <!-- GestureStability → Packet -->
  <line x1="597" y1="300" x2="597" y2="368" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="597" y1="368" x2="545" y2="368" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="545" y1="368" x2="545" y2="390" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MLCommandMapper → Packet -->
  <line x1="787" y1="300" x2="787" y2="368" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="787" y1="368" x2="590" y2="368" stroke="#4a5568" stroke-width="1.5"/>
  <line x1="590" y1="368" x2="590" y2="390" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Packet → SerialComm -->
  <line x1="480" y1="454" x2="480" y2="520" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="498" y="492" text-anchor="start" font-size="9" fill="#4a5568">packet string</text>

  <!-- SerialComm → MCU -->
  <line x1="480" y1="584" x2="480" y2="648" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="498" y="622" text-anchor="start" font-size="9" fill="#4a5568">serial / BT</text>

  <!-- Dashboard ← main (dashed) -->
  <line x1="770" y1="300" x2="770" y2="360" stroke="#718096" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="770" y1="360" x2="770" y2="390" stroke="#718096" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-dashed)"/>
  <text x="808" y="378" text-anchor="start" font-size="9" fill="#718096">display data</text>

  <!-- config.json ← modules (dashed) -->
  <line x1="150" y1="220" x2="150" y2="390" stroke="#718096" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow-dashed)"/>

  <!-- Logger ← main (dashed) -->
  <line x1="240" y1="118" x2="150" y2="118" stroke="#718096" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="150" y1="118" x2="150" y2="520" stroke="#718096" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow-dashed)"/>

  <!-- ===================== LEGEND ===================== -->
  <rect x="30" y="630" width="270" height="58" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="165" y="647" text-anchor="middle" font-size="10" font-weight="bold" fill="#4a5568">LEGEND</text>
  <line x1="45" y1="660" x2="85" y2="660" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="95" y="664" font-size="10" fill="#4a5568">Data / control flow</text>
  <line x1="45" y1="678" x2="85" y2="678" stroke="#718096" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-dashed)"/>
  <text x="95" y="682" font-size="10" fill="#718096">Config / logging (support)</text>

  <!-- ===================== ARROW MARKERS ===================== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a5568"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#718096"/>
    </marker>
  </defs>

</svg>
